name: e2e

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Lint (ruff)
        working-directory: tests/e2e
        run: uv run ruff check .
      - name: Format check (ruff)
        working-directory: tests/e2e
        run: uv run ruff format --check .
      - name: Type-check (ty)
        working-directory: tests/e2e
        run: uv run --with ty ty check .
      - name: End-to-end (pytest + live yopass)
        working-directory: tests/e2e
        run: uv run pytest -v
