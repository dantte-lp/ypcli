name: security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: securego/gosec@master
        with:
          # G304: the CLI intentionally opens user-specified files.
          # G204/G702: token_command and $EDITOR are user-configured subprocesses
          # by design (same pattern as any tool that shells out to $EDITOR).
          # All are inherent to a secret-sharing CLI and reviewed in SECURITY.md.
          args: -exclude=G204,G304,G702 ./...
