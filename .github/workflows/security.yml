name: security

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          check-latest: true
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3 # v2.28.0
        with:
          # G304: the CLI intentionally opens user-specified files.
          # G204/G702: token_command and $EDITOR are user-configured subprocesses
          # by design (same pattern as any tool that shells out to $EDITOR).
          # All are inherent to a secret-sharing CLI and reviewed in SECURITY.md.
          args: -exclude=G204,G304,G702 ./...
