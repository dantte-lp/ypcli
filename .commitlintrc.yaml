extends:
  - "@commitlint/config-conventional"

rules:
  type-enum:
    - 2
    - always
    - - feat
      - fix
      - chore
      - docs
      - build
      - ci
      - refactor
      - perf
      - test
      - style
      - revert
  scope-enum:
    - 2
    - always
    - - cli
      - api
      - crypto
      - config
      - output
      - clipboard
      - mcp
      - share
      - docs
      - ci
      - build
      - deps
      - release
      - test
      - lint
      - security
  # Allow acronyms (MCP, SDK, HTTP) in subjects; only forbid Title-Case / ALL-CAPS
  # subjects, matching the @commitlint/config-conventional default.
  subject-case:
    - 2
    - never
    - - upper-case
      - pascal-case
      - start-case
  header-max-length:
    - 2
    - always
    - 100
  body-max-line-length:
    - 1
    - always
    - 120
