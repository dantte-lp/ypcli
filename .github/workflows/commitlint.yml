name: commitlint

on:
  pull_request:

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate commits (Conventional Commits 1.0.0)
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yaml
