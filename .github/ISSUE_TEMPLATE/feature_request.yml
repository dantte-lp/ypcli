name: Feature request
description: Suggest an enhancement for ypcli
labels: [enhancement]
body:
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What command, flag, or output would you expect?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
